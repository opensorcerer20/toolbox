<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To Do Board</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <h1>To Do Board</h1>
  <button class="btn-download" onclick="downloadData()">Download JSON</button>
  <p class="tagline">"Do just one thing today, that's it"</p>
  <div class="board">

    <div class="left-col">
      <!-- ===== TO-DO LIST ===== -->
      <div class="panel">
        <h2>To-Do</h2>
        <div class="add-row">
          <input id="todo-input" type="text" placeholder="New task…" />
          <button class="btn-add" onclick="addTodo()">Add</button>
        </div>
        <ul id="todo-list"></ul>
      </div>

      <!-- ===== HABIT TRACKER ===== -->
      <div class="panel">
        <h2>Daily Habits</h2>
        <div class="add-row">
          <input id="habit-input" type="text" placeholder="New habit…" />
          <button class="btn-add" onclick="addHabit()">Add</button>
        </div>
        <ul id="habit-list"></ul>
      </div>
    </div>

    <!-- ===== MULTI-STEP TASKS ===== -->
    <div class="panel">
      <h2>Step-by-Step</h2>
      <div id="step-builder">
        <div class="add-row">
          <input id="step-task-input" type="text" placeholder="Task name…" />
        </div>
        <div class="step-add-steps" id="step-fields">
          <div class="step-input-row">
            <input type="text" placeholder="Step 1…" />
            <button class="btn-del" onclick="removeStepField(this)">✕</button>
          </div>
        </div>
        <div class="step-add-steps step-add-actions">
          <button class="btn-add-step-field" onclick="addStepField()">+ Step</button>
          <button class="btn-confirm-task" onclick="addStepTask()">Add Task</button>
        </div>
      </div>
      <ul id="step-list"></ul>
    </div>

  </div>

  <script src="index.js"></script>
</body>
</html>
