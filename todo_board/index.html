<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To Do Board</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div id="app"></div>

  <!-- Step-task edit modal -->
  <div id="step-edit-modal" class="modal-overlay hidden" onclick="onStepModalOverlayClick(event)">
    <div class="modal step-edit-modal-inner">
      <h3 class="modal-title">Edit Step Task</h3>
      <div id="step-edit-form-body"></div>
    </div>
  </div>

  <!-- Edit modal -->
  <div id="edit-modal" class="modal-overlay hidden" onclick="onModalOverlayClick(event)">
    <div class="modal">
      <h3 class="modal-title">Edit</h3>
      <input id="modal-input" type="text" />
      <div id="modal-category-slot"></div>
      <div class="modal-star-row">
        <span class="modal-star-label">Starred</span>
        <span id="modal-star-slot"></span>
      </div>
      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeEditModal()">Cancel</button>
        <button class="btn-add" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
