<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crazywall</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toolbar">
  <span>Crazywall</span>
  <button id="add-note">+ New note</button>
  <button id="connect-btn">Connect</button>
  <button id="export-btn" title="Export data">
    <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 2v8M5 7l3 3 3-3"/>
      <path d="M3 12h10"/>
    </svg>
  </button>
</div>
<div id="conn-status"></div>

<div id="board">
  <svg id="connections-svg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:1;"></svg>
</div>

<script src="script.js"></script>
</body>
</html>
